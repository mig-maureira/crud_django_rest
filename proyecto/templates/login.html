{% extends "base.html" %}
{% load static %}

{% block content %}
<section class="hero-section" id="inicio">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow mt-5">
                    <div class="card-body p-4">
                        <h1 class="text-center mb-4">Inicio de Sesión</h1>

                        {% if form.errors %}
                        <div class="alert alert-danger">
                            {{ form.errors }}
                        </div>
                        {% endif %}

                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="id_username" class="form-label">Usuario</label>
                                {{ form.username }}
                            </div>
                            <div class="mb-3">
                                <label for="id_password" class="form-label">Contraseña</label>
                                {{ form.password }}
                            </div>
                            <button type="submit" class="btn-skew w-100">Iniciar Sesión</button>
                        </form>

                        <p class="text-center mt-3 mb-0">
                            <a class="btn btn-skew_sec" href="{% url 'home' %}">Volver</a>
                        </p>
                        <p class="text-center mt-2">
                            ¿No tienes cuenta? <a href="{% url 'registro' %}">Registrarse</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
