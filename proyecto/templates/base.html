{% load static %}
<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{% block title %}{{ titulo|default:"Sitio" }}{% endblock %}</title>

    <!-- Bootstrap vía CDN (estructura visual rápida) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />

    <!-- CSS propio (static) -->
    <link rel="stylesheet" href="{% static 'css/main.css' %}" />
</head>

<body>



    {% include 'includes/navbar.html' %}
    {% block content %}{% endblock %}
    {% include 'includes/footer.html' %}


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- saltan en rojos los colores; eso esta bien, asi es -->
    <script src="https://kit.fontawesome.com/3df372bf23.js" crossorigin="anonymous"></script>
    <script>
        // Actualizar año en el footer
        document.getElementById('year').textContent = new Date().getFullYear();

        // Navbar cambia de color al hacer scroll
        window.addEventListener('scroll', function () {
            if (window.scrollY > 50) {
                document.querySelector('.navbar-custom').classList.add('scrolled');
            } else {
                document.querySelector('.navbar-custom').classList.remove('scrolled');
            }
        });
    </script>
</body>

</html>
