{% extends "base.html" %}
{% load static %}

{% block content %}
<section class="hero-section" id="inicio" style="background-image: url('');">
    <div class="hero-overlay">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-10 col-lg-8">
                    <div class="card shadow mt-5">
                        <div class="card-body p-4">
                            <h1 class="text-center mb-4">Registro</h1>

                            <form method="POST">
                                {% csrf_token %}
                                <input type="text" name="username" placeholder="Usuario">
                                <input type="email" name="email" placeholder="Correo">
                                <input type="password" name="password" placeholder="Contraseña">
                                <button type="submit" class="btn-skew w-100 mt-3">Registrar</button>
                            </form>

                            <p class="text-center mt-3 mb-0">
                                <a class="btn-skew_sec" href="{% url 'home' %}">volver</a>
                            </p>
                            <p>¿Ya tienes cuenta? <a href="{% url 'login' %}">Login</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</section>

<div class="modal fade" id="alerta-msg" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="exampleModalLabel text-danger">Aviso del Sistema</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p>Lo sentimos. No puede ingresar porque el usuario no es válido o no tiene permisos suficientes.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                <a href="{% url 'home' %}" class="btn-skew_red">Ir de todas formas</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
